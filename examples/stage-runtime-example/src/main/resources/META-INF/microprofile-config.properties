openapi.ui.yamlUrl=/hello-api/openapi
openapi.ui.title=Hello API
mp.openapi.extensions.path=/hello-api/openapi

# Session-cookie approach: no OpenAPI OAuth2 scheme is declared, so Swagger
# UI shows no Authorize button. Authentication happens when the user first
# visits the WAR — Elytron OIDC redirects to Keycloak, the user logs in,
# and the resulting JSESSIONID cookie rides along on every subsequent
# same-origin request (including Swagger UI's "Try it out" fetches).
