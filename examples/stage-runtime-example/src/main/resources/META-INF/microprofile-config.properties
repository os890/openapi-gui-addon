openapi.ui.yamlUrl=/hello-api/openapi
openapi.ui.title=Hello API
mp.openapi.extensions.path=/hello-api/openapi

# OAuth2 / Keycloak — use the oauth2-redirect.html that the addon already
# serves from the bundled swagger-ui webjar. MUST be an absolute URL
# (scheme + host + port) because Keycloak rejects bare paths, and MUST be
# listed in the Keycloak client's redirectUris (see realm-demo.json).
# The client_id (openapi-ui) and scope (openid) are entered by the user
# in Swagger UI's Authorize dialog.
openapi.ui.oauth2RedirectUri=http://localhost:8080/hello-api/webjars/swagger-ui/5.18.2/oauth2-redirect.html

# OASFilter that injects the OAuth2 security scheme at runtime — avoids
# hardcoding Keycloak URLs in DemoApplication.java. The URLs below can
# be overridden per stage via env vars or -D system properties.
mp.openapi.filter=org.os890.mp.openapi.gui.example.OAuth2SecurityFilter
app.oauth2.authorizationUrl=http://localhost:8081/realms/demo/protocol/openid-connect/auth
app.oauth2.tokenUrl=http://localhost:8081/realms/demo/protocol/openid-connect/token
