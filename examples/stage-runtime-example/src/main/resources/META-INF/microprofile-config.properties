openapi.ui.yamlUrl=/hello-api/openapi
openapi.ui.title=Hello API
mp.openapi.extensions.path=/hello-api/openapi

# OASFilter injects a plain HTTP Bearer security scheme plus a
# document-level SecurityRequirement. The token itself is obtained by the
# embedded OIDC+PKCE client in openapi.html; the server only validates.
mp.openapi.filter=org.os890.mp.openapi.gui.example.OAuth2SecurityFilter

# Keys below are read by the Templates class (openapi.ui.* are substituted
# into openapi.html as %openapi.ui.<key>% placeholders). They drive the
# embedded OIDC+PKCE client — one per realm/client, overridable per stage
# via env vars or -D system properties.
openapi.ui.keycloakUrl=http://localhost:8081
openapi.ui.keycloakRealm=demo
openapi.ui.keycloakClientId=openapi-ui
