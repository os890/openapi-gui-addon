<!-- Based on https://github.com/microprofile-extensions/openapi-ext -->
<!-- Changes: removed Google Fonts, added multi-API dropdown with availability check -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>%title%</title>

        <link href="%contextRoot%/webjars/swagger-ui/${swagger-ui.version}/swagger-ui.css" rel="stylesheet" type="text/css" />
        <link href="%contextRoot%/webjars/swagger-ui-themes/${swagger.ui.themes.version}/themes/3.x/theme-%swaggerUiTheme%.css" rel="stylesheet" type="text/css" />
        <link href="style.css" rel="stylesheet" type="text/css" />
    </head>

    <body>
        <div id="swagger-ui"></div>
        <script src='%contextRoot%/webjars/swagger-ui/${swagger-ui.version}/swagger-ui-bundle.js' type='text/javascript'></script>
        <script src='%contextRoot%/webjars/swagger-ui/${swagger-ui.version}/swagger-ui-standalone-preset.js' type='text/javascript'></script>
        <script>
            var defined_apis = %urlsData%;

            window.onload = async function () {
                var swaggerConfig = {
                    dom_id: '#swagger-ui',
                    oauth2RedirectUrl: "%oauth2RedirectUri%",
                    deepLinking: true,
                    presets: [
                        SwaggerUIBundle.presets.apis,
                        SwaggerUIStandalonePreset
                    ],
                    plugins: [
                        SwaggerUIBundle.plugins.DownloadUrl
                    ],
                    layout: "StandaloneLayout"
                };

                if (defined_apis) {
                    var available = [];
                    var unavailable = [];

                    await Promise.all(defined_apis.map(async function (api) {
                        try {
                            var resp = await fetch(api.url, { method: 'HEAD' });
                            if (resp.ok) {
                                available.push(api);
                            } else {
                                unavailable.push(api);
                            }
                        } catch (e) {
                            unavailable.push(api);
                        }
                    }));

                    var byName = function (a, b) {
                        return (a.name || '').localeCompare(b.name || '');
                    };

                    var toPath = function (url) {
                        if (!url) return '';
                        try {
                            return new URL(url, window.location.origin).pathname;
                        } catch (e) {
                            return url;
                        }
                    };

                    // Longest-match wins so nested contexts like /a/b/openapi beat /a/openapi
                    var currentPath = window.location.pathname;
                    var current = null;
                    var currentMatchLen = -1;
                    available.forEach(function (api) {
                        var apiPath = toPath(api.url);
                        if (apiPath && currentPath.startsWith(apiPath + '-ui') && apiPath.length > currentMatchLen) {
                            current = api;
                            currentMatchLen = apiPath.length;
                        }
                    });

                    var others = available.filter(function (api) { return api !== current; }).sort(byName);
                    unavailable.sort(byName);

                    var ordered = current ? [current].concat(others) : others;

                    swaggerConfig.urls = ordered.length > 0 ? ordered : defined_apis;
                    if (current) {
                        swaggerConfig['urls.primaryName'] = current.name;
                    }
                    window.ui = SwaggerUIBundle(swaggerConfig);

                    if ((current && others.length > 0) || unavailable.length > 0) {
                        setTimeout(function () {
                            var select = document.querySelector('.swagger-ui .topbar select');
                            if (!select) return;

                            if (current && others.length > 0) {
                                var sepOther = document.createElement('option');
                                sepOther.disabled = true;
                                sepOther.textContent = '\u2500\u2500 Other available \u2500\u2500';
                                if (select.options.length > 1) {
                                    select.insertBefore(sepOther, select.options[1]);
                                } else {
                                    select.appendChild(sepOther);
                                }
                            }

                            if (unavailable.length > 0) {
                                var sepUnavail = document.createElement('option');
                                sepUnavail.disabled = true;
                                sepUnavail.textContent = '\u2500\u2500 Unavailable \u2500\u2500';
                                select.appendChild(sepUnavail);

                                unavailable.forEach(function (api) {
                                    var opt = document.createElement('option');
                                    opt.disabled = true;
                                    opt.textContent = api.name;
                                    opt.style.color = '#999';
                                    select.appendChild(opt);
                                });
                            }
                        }, 500);
                    }
                } else {
                    swaggerConfig.url = "%yamlUrl%";
                    window.ui = SwaggerUIBundle(swaggerConfig);
                }
            }
        </script>

        <div id='footer'>
            <p class="swagger-ui-wrap">
                <span class="createdWith">Created with <a target="_blank" href="http://www.microprofile-ext.org" data-sw-translate>MicroProfile Extensions: OpenApi</a></span> . &copy; %currentYear% %copyrighBy%
            </p>
        </div>
    </body>
</html>
